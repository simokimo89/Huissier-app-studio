<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <script>
      // Defensive interceptor for sandbox environments where window.fetch has only a getter
      (function() {
        try {
          var originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: function() { return originalFetch; },
            set: function(val) { 
              console.warn("Safely intercepted and ignored write attempt to window.fetch.");
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn("Could not patch window.fetch property descriptor:", e);
        }
      })();
    </script>
